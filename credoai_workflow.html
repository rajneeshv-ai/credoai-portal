<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Rajneesh Kumar Verma">
  <meta name="copyright" content="© 2026 Rajneesh Kumar Verma. Licensed under Apache 2.0.">
  
  <title>CredoAI Trust Engine Workflow</title>
  
  <style>
    :root {
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --accent: #185FA5;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --net: #E0F2FE;
      --python: #EDE9FE;
      --infra: #DCFCE7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    
    body {
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 32px 20px;
      overflow: hidden;
    }
    
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    /* Main Container */
    .container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 850px;
    }

    /* Progress Dots */
    .progress-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .dot {
      height: 8px;
      width: 24px;
      border-radius: 4px;
      background: var(--border);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      outline: none;
    }
    .dot:hover:not(.active):not(.done) { background: #CBD5E1; }
    .dot.active { width: 36px; background: var(--accent); }
    .dot.done { background: var(--success); }

    /* Card Wrapper */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-grow: 1;
      min-height: 0;
    }

    /* Scrollable Content */
    .card-content {
      padding: 32px 40px;
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .card-content::-webkit-scrollbar { display: none; } /* Hide scrollbar for clean look */
    .card-content { -ms-overflow-style: none; scrollbar-width: none; }

    .step-tag {
      display: inline-flex;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      align-self: flex-start;
      border: 1px solid rgba(0,0,0,0.05);
    }
    
    .step-title { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 12px; line-height: 1.2; }
    .step-sub { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }

    /* Flow Diagram */
    .flow-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #F8FAFC;
      padding: 16px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .flow-box {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: 600;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .arrow-sym { color: var(--text-muted); font-size: 14px; font-weight: 700; }

    /* Details Grid */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }
    
    .detail-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      transition: box-shadow 0.2s;
    }
    .detail-item:hover { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .detail-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .detail-val { font-size: 13px; font-weight: 500; color: var(--text-main); line-height: 1.6; white-space: pre-line; }

    /* Insight/Analogy Box */
    .insight-box {
      margin-top: auto;
      background: #FFFBEB;
      border-left: 4px solid var(--warning);
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      border-radius: 0 8px 8px 0;
    }
    .insight-icon { font-size: 24px; line-height: 1; }
    .insight-text { font-size: 14px; font-weight: 500; color: #92400E; line-height: 1.5; }

    /* Footer Nav */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: #F8FAFC;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .btn-prev {
      background: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
    }
    .btn-prev:hover:not(:disabled) { background: #F1F5F9; border-color: #CBD5E1; }
    .btn-next {
      background: var(--accent);
      color: #FFFFFF;
      border: 1px solid var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-next:hover { background: #0C447C; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    .step-counter { font-size: 13px; font-weight: 500; color: var(--text-muted); }
    .step-counter span { font-weight: 700; color: var(--text-main); }
  </style>
</head>
<body>

  <h2 class="sr-only">CredoAI Trust Engine workflow — interactive step-by-step explainer</h2>
  
  <div class="container">
    <div class="progress-bar" id="progress"></div>
    <div class="card" id="card"></div>
  </div>

  <script>
    function sendPrompt(msg) {
      alert("Triggering prompt: " + msg);
    }

    const steps = [
      {
        tag:'Step 0',tagColor:'#E0F2FE',tagText:'#0369A1',
        title:'The problem CredoAI solves',
        sub:'Before we walk through the flow, understand WHY it is built this way. Banks run on .NET + SQL — deterministic, typed, auditable. AI runs on Python — probabilistic, async, unpredictable. Naive integration breaks in production.',
        details:[
          {label:'Banking world',val:'.NET · SQL · transactions\nStrongly typed · auditable'},
          {label:'AI world',val:'Python · async · probabilistic\nDistributed · non-deterministic'},
          {label:'The risk',val:'State drift — bank says\n"done", AI says "failed"'},
          {label:'CredoAI\'s answer',val:'Governance baked into\nthe architecture itself'}
        ],
        analogy:'💡 Think of it like a translator between two countries that speak different languages — CredoAI makes them agree on every word before acting.',
        flow:[]
      },
      {
        tag:'Step 1',tagColor:'#DCFCE7',tagText:'#166534',
        title:'User sends a request',
        sub:'A user, app, or system sends a request to the .NET 10 ingestion layer. This is intentional — the AI is never exposed directly. .NET acts as the trusted enterprise front door.',
        details:[
          {label:'Who sends it',val:'User · Enterprise app\nExternal system · API consumer'},
          {label:'Entry point',val:'.NET 10 Ingestion Service\nHTTPS/REST only'},
          {label:'What happens here',val:'API Gateway receives\nModel validation runs\nTransactional Outbox records it'},
          {label:'Why .NET here',val:'Enterprises trust .NET.\nBanks already have it.\nAI never touches raw input.'}
        ],
        analogy:'💡 Like a reception desk at a bank — anyone can walk in, but they must check in first. Nobody goes directly to the vault.',
        flow:[{txt:'.NET Ingestion',c:'#E0F2FE',t:'#0369A1'},{sym:'→'},{txt:'API Gateway',c:'#DCFCE7',t:'#166534'},{sym:'→'},{txt:'Transactional Outbox',c:'#FFEDD5',t:'#9A3412'}]
      },
      {
        tag:'Step 2',tagColor:'#EDE9FE',tagText:'#5B21B6',
        title:'gRPC validation (PATH A — sync)',
        sub:'Before any AI sees the request, it goes through gRPC validation. Why gRPC instead of REST? Because REST allows any shape of data. gRPC requires a strict Protobuf contract — like a typed form that must be filled correctly.',
        details:[
          {label:'Protocol',val:'gRPC with Protobuf\nBinary · fast · strict schema'},
          {label:'What is validated',val:'Protobuf contract shape\nJWT token signature\nmTLS encryption check'},
          {label:'What is rejected',val:'Malformed payloads\nMissing JWT claims\nSchema drift attempts'},
          {label:'PATH A means',val:'Synchronous — waits for\nresponse before continuing\nLow latency path'}
        ],
        analogy:'💡 Like a customs officer checking your passport. If the passport format is wrong — even slightly — you don\'t get through. No exceptions.',
        flow:[{txt:'Request',c:'#F1F5F9',t:'#475569'},{sym:'→'},{txt:'gRPC + Protobuf',c:'#EDE9FE',t:'#5B21B6'},{sym:'→'},{txt:'JWT check',c:'#EDE9FE',t:'#5B21B6'},{sym:'→'},{txt:'mTLS verify',c:'#EDE9FE',t:'#5B21B6'}]
      },
      {
        tag:'Step 3',tagColor:'#FEE2E2',tagText:'#991B1B',
        title:'OPA — Zero Trust Policy Gate',
        sub:'This is one of the most important design decisions. OPA (Open Policy Agent) decides whether the request is ALLOWED. The AI is NOT trusted to make this decision — an external policy engine is.',
        details:[
          {label:'What OPA checks',val:'DPDPA 2023 compliance\nTenant isolation\nConsent & purpose binding\nData category gating'},
          {label:'Also checks',val:'JWT claims validity\nPolicy Decision Point\nDynamic policy reload\nAudit decision log'},
          {label:'Single PDP instance',val:'Called TWICE per request:\n① Pre-ingestion\n② Pre-AI boundary\nFail-closed · TTL 30s'},
          {label:'If OPA says NO',val:'Request denied immediately\nNo AI is called\nAudit log records denial\nNo exceptions possible'}
        ],
        analogy:'💡 Like a bouncer with a list. They don\'t ask the DJ (AI) whether you can come in — they check their own list. If you\'re not on it, you\'re out.',
        flow:[{txt:'Request',c:'#F1F5F9',t:'#475569'},{sym:'→'},{txt:'OPA PDP',c:'#FEE2E2',t:'#991B1B'},{sym:'✓→'},{txt:'Allowed',c:'#DCFCE7',t:'#166534'},{sym:'✗→'},{txt:'Denied + logged',c:'#FEF2F2',t:'#B91C1C'}]
      },
      {
        tag:'Step 4',tagColor:'#FFEDD5',tagText:'#9A3412',
        title:'LangGraph AI Orchestration',
        sub:'Now the request enters the AI brain. CredoAI uses LangGraph — not a simple chain — because banking workflows need to loop back, recover from errors, and checkpoint their state.',
        details:[
          {label:'What is LangGraph',val:'A state machine for AI\nNot a simple A→B chain\nCan loop · checkpoint · recover'},
          {label:'What runs here',val:'LangGraph state machine\nCheckpoint saver (fault tolerance)\nNeMo Guardrails (safety)\nTool / function calling\nShort + long term memory'},
          {label:'Why not a simple chain',val:'Banking workflows retry\nPartial failures happen\nAI needs to resume\nNot start over every time'},
          {label:'NeMo Guardrails',val:'Blocks jailbreak attempts\nPII safety layer\nRuns inside every node'}
        ],
        analogy:'💡 Like a project manager with a checklist. If step 3 fails, they don\'t restart from step 1 — they resume from the last saved checkpoint.',
        flow:[{txt:'Authorised request',c:'#DCFCE7',t:'#166534'},{sym:'→'},{txt:'LangGraph agent',c:'#FFEDD5',t:'#9A3412'},{sym:'→'},{txt:'NeMo safety check',c:'#FFEDD5',t:'#9A3412'},{sym:'→'},{txt:'Tool call / memory',c:'#FFEDD5',t:'#9A3412'}]
      },
      {
        tag:'Step 5',tagColor:'#EDE9FE',tagText:'#5B21B6',
        title:'GraphRAG — Knowledge Retrieval',
        sub:'The AI now needs to find the right information to answer. Standard RAG grabs flat documents. CredoAI uses GraphRAG — it searches a knowledge GRAPH (Neo4j) to understand how regulations connect to each other.',
        details:[
          {label:'Standard RAG problem',val:'Retrieves flat documents\nMisses relationships\nFails multi-hop questions\n"What rule depends on what?"'},
          {label:'GraphRAG solution',val:'Azure AI Search (BM25 + vector)\n+ Neo4j AuraDB (graph)\nFinds connected regulations\nMulti-hop traversal'},
          {label:'What it retrieves',val:'Subgraph of connected\nRBI regulatory entities\nNot just keyword matches\nRelationship-aware context'},
          {label:'Example',val:'"Does DPDPA Article 6 apply\nhere?" needs 3 connected\nnodes — graph finds them,\nflat search misses them'}
        ],
        analogy:'💡 Google Maps vs a phonebook. A phonebook gives you addresses (flat RAG). Google Maps shows you the roads between them — which is faster, what connects what (GraphRAG).',
        flow:[{txt:'LangGraph',c:'#FFEDD5',t:'#9A3412'},{sym:'→'},{txt:'Azure AI Search',c:'#EDE9FE',t:'#5B21B6'},{sym:'+'},{txt:'Neo4j graph',c:'#EDE9FE',t:'#5B21B6'},{sym:'→'},{txt:'Subgraph context',c:'#EDE9FE',t:'#5B21B6'}]
      },
      {
        tag:'Step 6',tagColor:'#FFEDD5',tagText:'#9A3412',
        title:'Confidence Gate — the research innovation',
        sub:'This is what makes CredoAI unique. After retrieval, it calculates a STRUCTURAL confidence score based on how densely connected the retrieved subgraph is. Dense graph = high certainty. Sparse = uncertain.',
        details:[
          {label:'The formula',val:'confidence = (2|E| / |V|·(|V|-1))\n× log(|V|+1) / log(max+1)\n|E| = edges · |V| = nodes'},
          {label:'What this measures',val:'How many regulations\nare connected to each other\nin the retrieved subgraph\nDense = confident'},
          {label:'Routing decision',val:'≥ 0.75 → AUTO (continue)\n< 0.75 → HITL (human review)\nThreshold calibrated on\n1200 RBI query pairs'},
          {label:'Why not LLM confidence',val:'LLMs can be confidently\nWRONG. Topology doesn\'t lie.\nGraph density is structural\nNot probabilistic guessing'}
        ],
        analogy:'💡 Like a surgeon\'s second opinion rule. If your evidence is thin and disconnected (sparse graph), a human must review before you act. If evidence is solid (dense graph), proceed.',
        flow:[{txt:'Subgraph retrieved',c:'#EDE9FE',t:'#5B21B6'},{sym:'→'},{txt:'Density score',c:'#FFEDD5',t:'#9A3412'},{sym:'≥0.75→'},{txt:'Auto continue',c:'#DCFCE7',t:'#166534'},{sym:'<0.75→'},{txt:'Human review',c:'#FEF2F2',t:'#B91C1C'}]
      },
      {
        tag:'Step 7',tagColor:'#DCFCE7',tagText:'#166534',
        title:'Transactional Outbox (PATH B — async)',
        sub:'Once business intent is confirmed, we switch to the async durability path. The Outbox pattern solves a fundamental problem: how do you guarantee that a database write AND a Kafka publish BOTH succeed or BOTH fail?',
        details:[
          {label:'The problem it solves',val:'DB commits → AI pod crashes\nKafka never gets the event\nSystems now DISAGREE\nIn banking: compliance failure'},
          {label:'Outbox solution',val:'Write DB + write outbox record\nIN THE SAME TRANSACTION\nOutbox publisher reads & publishes\nIf crash: replay from outbox'},
          {label:'Atomicity guarantee',val:'SQL commit = outbox commit\nThey cannot diverge\nNo manual reconciliation\nEver. By design.'},
          {label:'PATH B means',val:'Asynchronous — fire and forget\nOptimised for DURABILITY\nNot speed (that was PATH A)\nReplayable on any failure'}
        ],
        analogy:'💡 Like sending a registered letter. You write the letter AND log it in your register in one action. Even if the postman crashes, you have the log. The letter WILL be sent.',
        flow:[{txt:'Confirmed intent',c:'#DCFCE7',t:'#166534'},{sym:'→'},{txt:'DB write',c:'#FFEDD5',t:'#9A3412'},{sym:'+'},{txt:'Outbox write (atomic)',c:'#FFEDD5',t:'#9A3412'},{sym:'→'},{txt:'Kafka publish',c:'#EDE9FE',t:'#5B21B6'}]
      },
      {
        tag:'Step 8',tagColor:'#EDE9FE',tagText:'#5B21B6',
        title:'Kafka — the event backbone',
        sub:'Kafka is the highway between all services. Once the Outbox publishes an event, Kafka distributes it reliably. If a consumer crashes, the event is not lost — it sits in Kafka until the consumer recovers.',
        details:[
          {label:'What Kafka provides',val:'Partitions (parallelism)\nReplication (no data loss)\nAt-least-once delivery\nEvent replay on demand'},
          {label:'Dead Letter Queue (DLQ)',val:'max_retries = 3\nBackoff: 1s → 5s → 30s\nAfter DLQ: ops alert\n+ Saga compensation triggered'},
          {label:'Idempotency keys',val:'Each event has a unique key\nIf replayed: consumer detects\nduplicate and skips it\nNo double-processing'},
          {label:'Why not REST here',val:'REST is synchronous — waits\nKafka is async — fire and forget\nProducer never blocked by\nslow consumer. Scales better.'}
        ],
        analogy:'💡 Like a postal system with tracking. The sender (Outbox) drops the parcel. Kafka is the sorting centre — it guarantees delivery even if the delivery van (consumer) breaks down.',
        flow:[{txt:'Outbox publisher',c:'#DCFCE7',t:'#166534'},{sym:'→'},{txt:'Kafka topic',c:'#EDE9FE',t:'#5B21B6'},{sym:'→'},{txt:'Consumer service',c:'#FFEDD5',t:'#9A3412'},{sym:'fail→'},{txt:'DLQ + alert',c:'#FEF2F2',t:'#B91C1C'}]
      },
      {
        tag:'Step 9',tagColor:'#FFEDD5',tagText:'#9A3412',
        title:'Saga Orchestration — handling failures',
        sub:'What if a step halfway through the workflow fails? You can\'t just rollback a distributed system like a single database. Saga is the pattern that handles this by using compensating transactions.',
        details:[
          {label:'What is a Saga',val:'A sequence of local transactions\nEach step publishes an event\nIf step N fails: steps N-1\nback to 1 are compensated'},
          {label:'Why not 2-Phase Commit',val:'2PC is blocking — all services\nmust lock simultaneously\nAI inference is slow and\nprobabilistic. 2PC fails here.'},
          {label:'Compensation example',val:'Payment reserved → AI fails\n→ Saga compensates → payment\nreleased automatically\nNo manual intervention needed'},
          {label:'Supporting mechanisms',val:'Retry & Backoff\nTimeout Handling\nIdempotency Keys\nDead Letter Queue'}
        ],
        analogy:'💡 Like a multi-step bank transfer that can be unwound. If step 3 (AI decision) fails, the Saga automatically sends a reversal for step 2 (fund reservation). Like a transactional UNDO chain.',
        flow:[{txt:'Step 1 ok',c:'#DCFCE7',t:'#166534'},{sym:'→'},{txt:'Step 2 ok',c:'#DCFCE7',t:'#166534'},{sym:'→'},{txt:'Step 3 FAILS',c:'#FEF2F2',t:'#B91C1C'},{sym:'→'},{txt:'Compensate 2→1',c:'#FFEDD5',t:'#9A3412'}]
      },
      {
        tag:'Step 10',tagColor:'#E0F2FE',tagText:'#0369A1',
        title:'Observability — W3C Trace Context',
        sub:'Every AI action must be reconstructable for auditors. CredoAI propagates a single trace ID across EVERY service — .NET, gRPC, Kafka, Python, Neo4j. One ID tells you the entire story of one request.',
        details:[
          {label:'What is W3C Trace Context',val:'A standard trace ID format\npropagated across all services\nOne ID follows one request\nfrom entry to exit'},
          {label:'What is traced',val:'.NET ingress → gRPC → OPA\n→ LangGraph → Kafka\n→ Postgres → downstream\nEvery hop. Every call.'},
          {label:'Who consumes audit logs',val:'Compliance officers (live)\nRBI Audit Portal (automated)\nDPDPA Fiduciary Log (Article 12)\nOps team (incidents)'},
          {label:'RAGAS evaluation',val:'Faithfulness ≥ 0.90\nAnswer Relevance ≥ 0.85\nContext Precision ≥ 0.85\nContext Recall ≥ 0.85'}
        ],
        analogy:'💡 Like a parcel tracking number. One code follows the parcel from warehouse → van → door. Auditors type the request ID and see exactly what happened, when, and what decision was made.',
        flow:[{txt:'.NET trace ID',c:'#E0F2FE',t:'#0369A1'},{sym:'→'},{txt:'gRPC header',c:'#E0F2FE',t:'#0369A1'},{sym:'→'},{txt:'Kafka event',c:'#E0F2FE',t:'#0369A1'},{sym:'→'},{txt:'LangGraph node',c:'#E0F2FE',t:'#0369A1'},{sym:'→'},{txt:'Azure Monitor',c:'#E0F2FE',t:'#0369A1'}]
      },
      {
        tag:'Complete ✓',tagColor:'#DCFCE7',tagText:'#166534',
        title:'The full picture',
        sub:'Every design decision in CredoAI exists to solve one problem: how do you make AI safe enough for a bank? The answer: governance is not a feature — it is the architecture.',
        details:[
          {label:'PATH A (sync)',val:'gRPC validation\nOPA policy gate\nLow latency · fail-closed'},
          {label:'PATH B (async)',val:'Transactional Outbox\nKafka · Saga\nHigh durability · replayable'},
          {label:'AI safety layer',val:'GraphRAG Confidence Gate\nStructural HITL at < 0.75\nNeMo Guardrails on every node'},
          {label:'Enterprise outcome',val:'Zero state drift\nFull audit trail\nDPDPA + RBI compliant\nDeployable in production'}
        ],
        analogy:'🏦 CredoAI = A bank vault with a brain. The vault (Outbox + Kafka + Saga) never loses a transaction. The brain (GraphRAG + HITL) never makes an unreviewed compliance decision.',
        flow:[]
      }
    ];

    let cur = 0;

    function render(){
      const s = steps[cur];
      
      document.getElementById('progress').innerHTML = steps.map((_, i) => `
        <button onclick="go(${i})" class="dot ${i === cur ? 'active' : ''} ${i < cur ? 'done' : ''}" aria-label="Step ${i + 1}"></button>
      `).join('');

      let flowHTML = '';
      if(s.flow.length) {
        flowHTML = `
          <div class="flow-row">
            ${s.flow.map(f => f.sym
              ? `<span class="arrow-sym">${f.sym}</span>`
              : `<span class="flow-box" style="background:${f.c};color:${f.t}">${f.txt}</span>`
            ).join('')}
          </div>
        `;
      }

      const cleanAnalogy = s.analogy.startsWith('💡 ') || s.analogy.startsWith('🏦 ') 
        ? s.analogy.substring(2).trim() 
        : s.analogy;
      const analogyIcon = s.analogy.startsWith('🏦') ? '🏦' : '💡';

      document.getElementById('card').innerHTML = `
        <div class="card-content">
          <div class="step-tag" style="background:${s.tagColor};color:${s.tagText}">
            ${s.tag}
          </div>

          <h3 class="step-title">${s.title}</h3>
          <p class="step-sub">${s.sub}</p>

          ${flowHTML}

          <div class="detail-grid">
            ${s.details.map(d => `
              <div class="detail-item">
                <div class="detail-label">${d.label}</div>
                <div class="detail-val">${d.val}</div>
              </div>
            `).join('')}
          </div>

          <div class="insight-box">
            <span class="insight-icon">${analogyIcon}</span>
            <p class="insight-text">${cleanAnalogy}</p>
          </div>
        </div>

        <div class="nav">
          <button onclick="go(${cur-1})" class="btn btn-prev" ${cur === 0 ? 'disabled' : ''}>
            ← Previous
          </button>
          
          <span class="step-counter">
            Step <span>${cur + 1}</span> of ${steps.length}
          </span>
          
          ${cur === steps.length - 1
            ? `<button class="btn btn-next">Finish</button>`
             :`<button class="btn btn-next" onclick="go(${cur+1})">Next →</button>`}
        </div>
      `;
    }

    function go(i){
      if(i < 0 || i >= steps.length) return;
      cur = i; 
      render();
    }

    render();
  </script>
</body>
</html>
